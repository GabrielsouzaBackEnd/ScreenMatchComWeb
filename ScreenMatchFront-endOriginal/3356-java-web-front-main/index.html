<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/home.css">
    <title>Screenmatch</title>
</head>

<body>
    <header class="cabecalho">
        <div class="cabecalho__logo">
            <img src="./img/logo.png" alt="Logo ScreenMatch">
            <h1>Screen match</h1>
            <select data-categorias>
                <option value="todos">Categorias</option>
                <option value="Comédia">Comédia</option>
                <option value="Ação">Ação</option>
                <option value="Crime">Crime</option>
                <option value="Drama">Drama</option>
                <option value="Aventura">Aventura</option>
            </select>
        </div>

        <div class="cabecalho__opcoes">
            <span class="material-symbols-outlined">
                search
            </span>

            <span class="material-symbols-outlined">
                notifications
            </span>

            <span class="material-symbols-outlined">
                account_circle
            </span>
        </div>
    </header>

    <main>
        <section data-name="lancamentos" class="section">
            <div class="section__header">
                <h2>Lançamentos no ScreenMatch</h2>
            </div>
            <div class="carousel">
                <button type="button" class="carousel-btn prev" aria-label="Anterior">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <ul class="lista"></ul>
                <button type="button" class="carousel-btn next" aria-label="Próximo">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </section>

        <section data-name="top5" class="section">
            <div class="section__header">
                <h2>Títulos populares no ScreenMatch</h2>
            </div>
            <div class="carousel">
                <button type="button" class="carousel-btn prev" aria-label="Anterior">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <ul class="lista"></ul>
                <button type="button" class="carousel-btn next" aria-label="Próximo">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </section>

        <section data-name="series" class="section">
            <div class="section__header">
                <h2>Títulos no ScreenMatch</h2>
            </div>
            <div class="carousel">
                <button type="button" class="carousel-btn prev" aria-label="Anterior">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <ul class="lista"></ul>
                <button type="button" class="carousel-btn next" aria-label="Próximo">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </section>

        <section data-name="categoria" class="hidden pesquisa">
            <div class="section__header">
                <h2>Títulos no ScreenMatch</h2>
            </div>
            <div class="carousel">
                <button type="button" class="carousel-btn prev" aria-label="Anterior">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <ul class="lista"></ul>
                <button type="button" class="carousel-btn next" aria-label="Próximo">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </section>
    </main>
    <script src="./scripts/index.js" type="module"></script>
</body>

</html>
